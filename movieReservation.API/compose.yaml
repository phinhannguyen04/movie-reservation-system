services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: moviereservation
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d moviereservation"]
      interval: 5s
      timeout: 5s
      retries: 5

  moviereservation:
    image: moviereservation
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=moviereservation;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
